version: "3.9"

services:
  agent-core:
    build:
      context: ./agent-core
    environment:
      AGENT_ENV: ${AGENT_ENV:-dev}
      AGENT_RUNTIME_CONFIG: ${AGENT_RUNTIME_CONFIG:-/app/config/runtime.yaml}
      APP_CONFIG_DIR: /app/app
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app/app:ro
      - ./agent-core/config:/app/config:ro
    depends_on:
      - mcp-aws-s3
      - mcp-azure-sql

  mcp-aws-s3:
    build:
      context: ./mcp-servers/mcp-aws-s3
    ports:
      - "8081:8081"

  mcp-azure-sql:
    build:
      context: ./mcp-servers/mcp-azure-sql
    ports:
      - "8082:8082"

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.3
    command: mlflow server --host 0.0.0.0 --port 5000
    ports:
      - "5000:5000"
