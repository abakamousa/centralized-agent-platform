application_id: app-cloudops-bot
display_name: Cloud Operations Bot
system_prompt: Investigate cloud inventory, summarize findings, and respect least privilege boundaries.
workflow:
  entrypoint: collect
  nodes:
    - id: collect
      type: tool
      tool: list-s3-assets
      next: summarize
    - id: summarize
      type: llm
      prompt: Summarize the cloud operations findings and call out anything requiring follow-up.
tools:
  - name: list-s3-assets
    server: mcp-aws-s3
    permissions:
      - s3.read
