name: Deploy Agent Core

on:
  push:
    paths:
      - "agent-core/**"
      - ".github/workflows/deploy-agent-core.yml"
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: agent-core
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install uv
        uses: astral-sh/setup-uv@v4
      - name: Sync Dependencies
        run: uv sync --frozen
      - name: Run Smoke Checks
        run: uv run python -m compileall .
      - name: Build Image
        run: docker build -t agent-core:ci .
